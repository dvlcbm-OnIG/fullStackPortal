<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendejas Portal</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* High-quality education-themed background image from Unsplash */
            background-image: url('https://images.unsplash.com/photo-1513258496099-48168024aec0?q=80&w=1920&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #ffffff;
        }

        /* Dark overlay to make the text and cards pop out */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 1;
        }

        .content {
            position: relative;
            z-index: 2;
            text-align: center;
            width: 100%;
        }

        h1 {
            font-size: 3.5rem;
            margin-bottom: 50px;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.6);
            letter-spacing: 2px;
        }

        .card-container {
            display: flex;
            gap: 40px;
            justify-content: center;
            flex-wrap: wrap;
            padding: 0 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.9);
            color: #333;
            width: 250px;
            padding: 50px 20px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease, background 0.3s ease;
            text-decoration: none;
            display: block;
            backdrop-filter: blur(5px);
        }

        .card:hover {
            transform: translateY(-15px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5);
            background: rgba(255, 255, 255, 1);
        }

        .card h2 {
            margin: 0;
            font-size: 2.2rem;
            color: #1976d2; /* Nice blue color for the text */
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            h1 {
                font-size: 2.2rem;
                padding: 0 10px;
            }
            .card {
                width: 80%;
                max-width: 250px;
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="overlay"></div>
    
    <div class="content">
        <h1>Welcome to Pendejas Portal</h1>

        <div class="card-container">
            <a href="/frontend/SetupAccount/StudentSignIn.html" class="card">
                <h2>Student</h2>
            </a>
            <a href="/frontend/SetupAccount/TeacherSignIn.html" class="card">
                <h2>Teacher</h2>
            </a>
            <a href="/frontend/SetupAccount/AdminLogin.html" class="card">
                <h2>Admin</h2>
            </a>
        </div>
    </div>
</body>
</html>
