<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Sign In - Pendejas Portal</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fafafa;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .signin-container {
            background: #ffffff;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
            border-top: 5px solid #2e7d32;
        }

        h2 {
            color: #2e7d32;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: bold;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 16px;
        }

        .input-group input:focus {
            border-color: #2e7d32;
            outline: none;
            box-shadow: 0 0 5px rgba(46, 125, 50, 0.3);
        }

        .btn {
            background: #2e7d32;
            color: #ffffff;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s ease;
            font-weight: bold;
        }

        .btn:hover {
            background: #1b5e20;
        }

        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #2e7d32;
            text-decoration: none;
            font-size: 14px;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        /* Responsive Design */
        @media (max-width: 480px) {
            .signin-container {
                padding: 20px;
                width: 85%;
            }
        }
    </style>
</head>
<body>
    <div class="signin-container">
        <h2>Teacher Sign In</h2>
        <form id="teacherForm">
            <div class="input-group">
                <label for="teacher-name">Full Name</label>
                <input type="text" id="teacher-name" name="teacher-name" placeholder="Jane Doe" required>
            </div>
            <div class="input-group">
                <label for="teacher-email">Staff Email / Username</label>
                <input type="text" id="teacher-email" name="teacher-email" placeholder="name@school.edu" required>
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn">Sign In As Teacher</button>
        </form>
        <a href="TeacherLogin.html" class="back-link">Already have an account? Login</a><br>
        <a href="../../index.html" class="back-link">&larr; Back to Portal</a>
    </div>

    <script>
        document.getElementById('teacherForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('teacher-name').value;
            const email = document.getElementById('teacher-email').value;
            const password = document.getElementById('password').value;

            // Try to Login First as a strict 'Teacher' role
            try {
                const res = await fetch('https://fullstackportal.onrender.com/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ identifier: email, password: password, role: 'teacher' })
                });

                if(res.ok) {
                    const user = await res.json();
                    
                    localStorage.setItem('username', user.email);
                    localStorage.setItem('email', user.email);
                    localStorage.setItem('password', user.password);
                    
                    window.location.href = '../Main/environment.html';
                } else if(res.status === 401) {
                    
                    // If login failed, automatically create their Teacher Account (No dedicated register page yet)
                    const regRes = await fetch('https://fullstackportal.onrender.com/api/register', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ role: 'teacher', name: name, email: email, password: password }) // Notice role
                    });
                    
                    if(regRes.ok) {
                        alert("Teacher Account Created Successfully! Welcome to the portal.");
                        
                        localStorage.setItem('username', email);
                        localStorage.setItem('email', email);
                        localStorage.setItem('password', password);
                        window.location.href = '../Main/environment.html';
                    } else if (regRes.status === 400) {
                        alert("Hold up! An account with that Email is already registered as a Student. Teachers and Students must use separate accounts.");
                    } else {
                        alert("Invalid credentials or server error.");
                    }
                }
            } catch (err) {
                console.error(err);
                alert("Cannot connect to backend server. Make sure node backend is running.");
            }
        });
    </script>
</body>
</html>
