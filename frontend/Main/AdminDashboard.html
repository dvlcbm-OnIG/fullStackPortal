<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Pendejas Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #edf2f7;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .main-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 30px;
            background-color: #1e40af;
            color: white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.12);
        }

        .main-nav h2 {
            margin: 0;
            font-size: 1.5rem;
        }

        .main-nav button {
            background-color: transparent;
            border: 1px solid white;
            color: white;
            border-radius: 8px;
            padding: 10px 18px;
            font-weight: 700;
            cursor: pointer;
        }

        .main-nav button:hover {
            background-color: rgba(255,255,255,0.15);
        }

        main {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .section-card {
            background: white;
            border-radius: 16px;
            padding: 28px;
            margin-bottom: 24px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
        }

        .section-card h2 {
            margin-top: 0;
            color: #1e293b;
        }

        .summary {
            display: flex;
            gap: 18px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .summary-card {
            flex: 1;
            min-width: 180px;
            background: #e2e8f0;
            border-radius: 12px;
            padding: 18px;
        }

        .summary-card h3 {
            margin: 0 0 8px;
            font-size: 1rem;
            color: #0f172a;
        }

        .summary-card p {
            margin: 0;
            font-size: 1.7rem;
            font-weight: 700;
            color: #1e3a8a;
        }

        .table-output {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 700px;
        }

        th, td {
            padding: 16px 14px;
            border-bottom: 1px solid #e2e8f0;
            text-align: left;
        }

        th {
            background-color: #f8fafc;
            color: #1e293b;
            font-weight: 700;
        }

        tr:hover {
            background-color: #f1f5f9;
        }

        .empty-state {
            padding: 24px;
            color: #475569;
        }

        .loading-state {
            padding: 24px;
            color: #64748b;
            font-style: italic;
        }

        .error-state {
            padding: 24px;
            color: #dc2626;
            background-color: #fef2f2;
            border-left: 4px solid #dc2626;
        }

        @media (max-width: 900px) {
            .summary {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <nav class="main-nav">
        <div>
            <h2><i class="fa-solid fa-user-shield"></i> Admin Dashboard <span id="adminWelcome" style="font-size: 1rem; font-weight: 400; margin-left: 12px;"></span></h2>
        </div>
        <div style="display: flex; gap: 10px;">
            <button id="refreshBtn" style="background-color: #059669; border: 1px solid #059669;"><i class="fa-solid fa-refresh"></i> Refresh</button>
            <button id="signOutBtn"><i class="fa-solid fa-right-from-bracket"></i> Sign Out</button>
        </div>
    </nav>

    <main>
        <section class="section-card">
            <div class="summary">
                <div class="summary-card">
                    <h3>Total Teachers</h3>
                    <p id="teacherCount">0</p>
                </div>
                <div class="summary-card">
                    <h3>Total Students</h3>
                    <p id="studentCount">0</p>
                </div>
            </div>
        </section>

        <section class="section-card">
            <h2>Teachers Accounts</h2>
            <div class="table-output">
                <table>
                    <thead>
                        <tr>
                            <th>Email</th>
                            <th>Role</th>
                        </tr>
                    </thead>
                    <tbody id="teachersTableBody"></tbody>
                </table>
            </div>
        </section>

        <section class="section-card">
            <h2>Student Accounts</h2>
            <div class="table-output">
                <table>
                    <thead>
                        <tr>
                            <th>Student ID</th>
                            <th>First Name</th>
                            <th>Last Name</th>
                            <th>Email</th>
                        </tr>
                    </thead>
                    <tbody id="studentsTableBody"></tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="../Script/adminDashboard.js"></script>
</body>
</html>
